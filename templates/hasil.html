<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShrinkLab | Hasil</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"> <link rel="stylesheet" href="{{ url_for('static', filename='static/css/style.css') }}">
</head>
<body class="dark-theme">
    <div class="container">
        <!-- Panel Hasil -->
        <div class="panel process-results">
            <header class="success-header">
                <h3>Processing Complete</h3>
                <p>Operation finished with high efficiency</p>
            </header>

            <!-- Preview Data dari Backend -->
            <div class="result-card">
                <div class="file-info">
                    <p><strong>Nama File:</strong> {{ nama_file }}</p>
                </div>

                <div class="stats">
                    <div class="stat-box">
                        <p>ORIGINAL</p>
                        <h4>{{ ukuran_asli }} MB</h4>
                    </div>
                    <div class="stat-box optimized">
                        <p>OPTIMIZED</p>
                        <h4>{{ ukuran_baru }} MB</h4>
                    </div>
                </div>

                <div class="reduction-info">
                    <p>Total Reduction</p>
                    <strong>{{ persentase }}%</strong>
                </div>

                <!-- Tombol Download -->
                <a href="{{ url_for('download_file', filename=nama_file) }}" class="btn-primary">
                    Download File
                </a>
            </div>

            <!-- Tombol Kembali -->
            <a href="{{ url_for('index') }}" class="btn-secondary">
                Process Another File
            </a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
