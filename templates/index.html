<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media_Core | Upload</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="dark-theme">
    <div class="container">
        <!-- Panel Utama: Media Tools Hub -->
        <div class="panel tools-hub">
            <header>
                <h3>⚙️ MEDIA_CORE</h3>
            </header>
            
            <!-- Form ini akan mengirim data ke app.py -->
            <form action="/proses" method="POST" enctype="multipart/form-data">
                
                <!-- Area Upload File -->
                <div class="upload-area">
                    <p>Initialize Pipeline</p>
                    <input type="file" name="file_input" required>
                </div>

                <!-- Pilihan Modul -->
                <div class="modules">
                    <h4>Core Modules</h4>
                    
                    <div class="module-group">
                        <label>Pilih Algoritma:</label>
                        <select name="algoritma">
                            <option value="kompresi_huffman">Standard Compression (Huffman)</option>
                            <option value="stegano_lsb">Steganography (LSB)</option>
                        </select>
                    </div>

                    <!-- Input teks rahasia (muncul kalau milih Steganografi) -->
                    <div class="module-group">
                        <label>Pesan Rahasia (Hanya untuk Stegano):</label>
                        <input type="text" name="pesan_rahasia" placeholder="Ketik pesan di sini...">
                    </div>
                </div>

                <!-- Tombol Eksekusi -->
                <button type="submit" class="btn-primary">START PROCESSING</button>
            </form>
        </div>
    </div>
</body>
</html>
