<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShrinkLab | Upload</title> 
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="dark-theme">
    <div class="container">
        <div class="panel tools-hub">
            <header>
                <h3>ShrinkLab</h3>
            </header>
            
            <!-- Form untuk mengirim data ke app.py -->
            <form action="/proses" method="POST" enctype="multipart/form-data">
                
                <!-- Upload File -->
                <div class="upload-area">
                    <p>Initialize Pipeline</p>
                    <input type="file" name="file_input" required>
                </div>

                <!-- Pilihan Modul -->
                <div class="modules">
                    <h4>Core Modules</h4>
                    
                    <div class="module-group">
                        <label>Pilih Mode Operasi:</label>
                        <select name="algoritma">
                            <!-- Fitur Kompresi & Dekompresi -->
                            <option value="kompresi">Compress (Mengecilkan File)</option>
                            <option value="dekompresi">Decompress (Mengembalikan File)</option>
                            
                            <!-- Fitur Steganografi -->
                            <option value="stegano_hide">Hide Message (Sisipkan Pesan)</option>
                            <option value="stegano_reveal">Reveal Message (Ekstrak Pesan)</option>
                        </select>
                    </div>

                    <!-- Input teks rahasia (steganografi) -->
                    <div class="module-group">
                        <label>Pesan Rahasia (Hanya untuk Hide Message):</label>
                        <input type="text" name="pesan_rahasia" placeholder="Ketik pesan di sini...">
                    </div>
                </div>

                <!-- Tombol Eksekusi -->
                <button type="submit" class="btn-primary">START PROCESSING</button>
            </form>
        </div>
    </div>
</body>
</html>
